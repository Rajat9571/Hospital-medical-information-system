name: codeverify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run codeverify gate
        env:
          CODEVERIFY_REFRESH_TOKEN: ${{ secrets.CODEVERIFY_REFRESH_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/ci_verify.py
